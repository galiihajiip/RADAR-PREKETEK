services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      AI_SERVICE_URL: http://ai-service:5001
    depends_on:
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: .
      dockerfile: docker/ai-service.Dockerfile
    ports:
      - "5001:5001"
    env_file: .env
    environment:
      MODEL_PATH: /models/radar_mobilenetv3_small.pt
      DEMO_AI_FALLBACK: "true"
    volumes:
      - ./ml/models:/models:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  postgres:
    image: postgis/postgis:15-3.4
    profiles: ["db"]
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: radar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - radar-postgres:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d/01-migrations:ro
      - ./database/seed:/docker-entrypoint-initdb.d/02-seed:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d radar"]
      interval: 20s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    profiles: ["db"]
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  radar-postgres:
